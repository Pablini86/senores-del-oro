<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Colección — Señores del Oro</title>
<meta name="description" content="Catálogo completo de joyería en oro: cadenas, pulsos, broqueles y piezas únicas. Hecho a pedido en Guadalajara, entrega en 1 semana.">
<meta property="og:type" content="website">
<meta property="og:title" content="Colección — Señores del Oro">
<meta property="og:description" content="Catálogo completo de joyería en oro: cadenas, pulsos, broqueles y piezas únicas.">
<meta property="og:image" content="https://senoresdeloro.com/assets/SEN_ORES_DEL_ORO_NEGRO_CON_DORADO.png">
<meta property="og:url" content="https://senoresdeloro.com/coleccion.html">
<meta name="twitter:card" content="summary_large_image">
<link rel="canonical" href="https://senoresdeloro.com/coleccion.html">
<link rel="stylesheet" href="assets/style.css">
<link rel="apple-touch-icon" href="assets/favicon.png">
<link rel="icon" type="image/png" href="assets/favicon.png">
  
<style>
.page-hero {
  padding: 160px 60px 80px;
  background: var(--carbon2);
  position: relative; overflow: hidden;
}
.page-hero-bg {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(60px,18vw,260px); font-weight: 600;
  color: rgba(201,168,76,.03); pointer-events: none; white-space: nowrap; letter-spacing: -6px;
}
.page-hero h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(48px,6vw,88px); font-weight: 300;
  color: var(--champagne); line-height: 1; position: relative; z-index: 1;
}

/* FILTERS */
.catalog-section { padding: 0 60px 100px; background: var(--carbon2); }
.tabs {
  display: flex; border-bottom: 1px solid rgba(201,168,76,.12);
  margin-bottom: 52px; position: sticky; top: 56px; background: var(--carbon2);
  z-index: 10; padding-top: 1px;
}
.tab {
  font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
  color: rgba(232,224,204,.4); padding: 14px 28px; cursor: pointer;
  border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all .3s;
  display: flex; align-items: center; gap: 8px;
  top: 150px; 
}
.tab:hover { color: var(--champagne); }
.tab.active { color: var(--oro); border-bottom-color: var(--oro); }
.tab-count { font-size: 9px; opacity: .5; }

.cat-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 2px; }
.cat-grid.cols5 { grid-template-columns: repeat(5,1fr); }

/* SEARCH */
.search-bar {
  display: flex; align-items: center; gap: 16px;
  margin-bottom: 16px; padding: 28px 0 0;
}
.search-input {
  background: rgba(255,255,255,.04); border: 1px solid rgba(201,168,76,.15);
  color: var(--champagne); font-family: 'Montserrat', sans-serif; font-size: 12px;
  padding: 10px 18px; width: 280px; outline: none; letter-spacing: 1px;
  transition: border-color .3s;
}
.search-input::placeholder { color: rgba(232,224,204,.25); }
.search-input:focus { border-color: rgba(201,168,76,.4); }
.results-count { font-size: 10px; color: rgba(232,224,204,.35); letter-spacing: 2px; }

/* FILTERS BAR */
.filters-bar {
  display: flex; align-items: center; flex-wrap: wrap; gap: 14px;
  margin-bottom: 32px; padding-bottom: 24px;
  border-bottom: 1px solid rgba(201,168,76,.08);
}
.filter-select {
  background: rgba(255,255,255,.04); border: 1px solid rgba(201,168,76,.15);
  color: var(--champagne); font-family: 'Montserrat', sans-serif; font-size: 11px;
  padding: 9px 14px; outline: none; letter-spacing: .5px; cursor: pointer;
  transition: border-color .3s;
}
.filter-select:focus { border-color: rgba(201,168,76,.4); }
.filter-price {
  display: flex; align-items: center; gap: 6px;
}
.filter-price input {
  background: rgba(255,255,255,.04); border: 1px solid rgba(201,168,76,.15);
  color: var(--champagne); font-family: 'Montserrat', sans-serif; font-size: 11px;
  padding: 9px 10px; width: 90px; outline: none;
  transition: border-color .3s;
}
.filter-price input:focus { border-color: rgba(201,168,76,.4); }
.filter-price span { font-size: 10px; color: rgba(232,224,204,.3); }
.filter-check {
  display: flex; align-items: center; gap: 8px;
  font-size: 11px; color: rgba(232,224,204,.6); letter-spacing: .5px;
}
.filter-check input { width: auto; cursor: pointer; }
.filter-clear {
  font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
  color: var(--oro); background: none; border: none; cursor: pointer;
  padding: 0; text-decoration: underline; text-underline-offset: 3px;
}

  @media (max-width: 768px) {
  .page-hero { padding: 120px 24px 60px; }
  .page-hero-bg { font-size: 72px; }
  .catalog-section { padding: 0 16px 80px; }
  .tabs { top: 56px; gap: 0; }
  .tab { padding: 14px 12px; font-size: 9px; letter-spacing: 1.5px; }
  .cat-grid { grid-template-columns: repeat(2,1fr); }
  .cat-grid.cols5 { grid-template-columns: repeat(2,1fr); }
  .search-bar { flex-direction: column; align-items: flex-start; gap: 8px; }
  .search-input { width: 100%; }
  .filters-bar { flex-direction: column; align-items: flex-start; gap: 12px; }
}
</style>
</head>
<body>


<div id="site-header"></div>

<div class="page-hero">
  <div class="page-hero-bg">Colección</div>
  <div class="sec-label">Catálogo</div>
  <h1>Colección<br>Completa</h1>
</div>

<section class="catalog-section">
  <div class="tabs">
    <div class="tab active" data-cat="cadenas">Cadenas <span class="tab-count">13</span></div>
    <div class="tab" data-cat="pulsos">Pulsos <span class="tab-count">9</span></div>
    <div class="tab" data-cat="broqueles">Broqueles <span class="tab-count">130</span></div>
    <div class="tab" data-cat="unicas">Piezas Únicas <span class="tab-count" id="tabUnicas">—</span></div>
  </div>
  <div class="search-bar">
    <input type="text" class="search-input" id="searchInput" placeholder="Buscar pieza...">
    <span class="results-count" id="resultsCount"></span>
  </div>
  <div class="filters-bar">
    <select class="filter-select" id="sortSelect">
      <option value="default">Ordenar por</option>
      <option value="kilate">Kilataje</option>
      <option value="precio-asc">Precio: menor a mayor</option>
      <option value="precio-desc">Precio: mayor a menor</option>
      <option value="az">Nombre A-Z</option>
      <option value="za">Nombre Z-A</option>
    </select>
    <div class="filter-price">
      <span>$</span>
      <input type="number" id="priceMin" placeholder="Mín" min="0">
      <span>—</span>
      <input type="number" id="priceMax" placeholder="Máx" min="0">
    </div>
    <label class="filter-check">
      <input type="checkbox" id="onlyPriced">
      Solo con precio disponible
    </label>
    <button class="filter-clear" id="clearFilters" type="button">Limpiar filtros</button>
  </div>
  <div class="cat-grid" id="catGrid"></div>
</section>

<div id="site-footer"></div>
<div id="site-modal"></div>

<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="assets/config.js"></script>
<script src="assets/db.js"></script>
<script src="assets/partials.js"></script>
<script src="assets/modal.js"></script>
<script>
mountLayout({ navVariant: 'coleccion', activeKey: 'coleccion', modal: true });
setupModal();

let CATALOG = {};
let activeCat = 'cadenas';

// Read URL param
const params = new URLSearchParams(location.search);
if (params.get('cat')) activeCat = params.get('cat');

function renderGrid(items) {
  const grid = document.getElementById('catGrid');
  grid.innerHTML = '';
  grid.className = activeCat === 'broqueles' ? 'cat-grid cols5' : 'cat-grid';
  if (activeCat === 'unicas') {
    const el = document.getElementById('tabUnicas');
    if (el) el.textContent = items.length;
  }
  document.getElementById('resultsCount').textContent = `${items.length} piezas`;

  items.forEach(item => {
    const c = document.createElement('div');
    c.className = 'card';
    c.innerHTML = `
      <div class="card-img">
        ${item.foto
          ? `<img src="${item.foto}" class="photo" alt="${item.nombre}">`
          : `<div class="card-ph"><img src="assets/SEN_ORES_DEL_ORO_LOGO_UNICO_DORADO.png" alt=""></div>`}
        ${item.kilate ? `<span class="kilate">${item.kilate}</span>` : ''}
        ${item.destacado ? `<span class="badge-destacado">Destacada</span>` : ''}
        <div class="card-ov"><span>Ver pieza</span></div>
      </div>
      <div class="card-info">
        <div class="card-nombre">${item.nombre}</div>
        <div class="card-precio ${formatPrecio(item.precio) ? '' : 'na'}">${precioDisplay(item)}</div>
      </div>`;
    c.onclick = () => location.href = `producto.html?sku=${item.sku}`;
    grid.appendChild(c);
  });
}

// ── ORDEN Y FILTROS ──
function applyFilters() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const sortBy = document.getElementById('sortSelect').value;
  const priceMinRaw = document.getElementById('priceMin').value;
  const priceMaxRaw = document.getElementById('priceMax').value;
  const priceMin = priceMinRaw === '' ? null : parseFloat(priceMinRaw);
  const priceMax = priceMaxRaw === '' ? null : parseFloat(priceMaxRaw);
  const onlyPriced = document.getElementById('onlyPriced').checked;

  let items = (CATALOG[activeCat] || []).filter(i => i.sku && i.sku.trim() !== '');

  if (q) {
    items = items.filter(i =>
      i.nombre.toLowerCase().includes(q) ||
      i.sku.toLowerCase().includes(q) ||
      i.desc.toLowerCase().includes(q)
    );
  }

  // Un rango de precio solo tiene sentido sobre piezas con precio fijado
  if (onlyPriced || priceMin !== null || priceMax !== null) {
    items = items.filter(i => i.precio !== null && i.precio !== undefined);
  }
  if (priceMin !== null) items = items.filter(i => i.precio >= priceMin);
  if (priceMax !== null) items = items.filter(i => i.precio <= priceMax);

  items = [...items].sort((a, b) => {
    switch (sortBy) {
      case 'kilate': return (a.kilate || '').localeCompare(b.kilate || '');
      case 'precio-asc': return (a.precio ?? Infinity) - (b.precio ?? Infinity);
      case 'precio-desc': return (b.precio ?? -Infinity) - (a.precio ?? -Infinity);
      case 'az': return a.nombre.localeCompare(b.nombre, 'es');
      case 'za': return b.nombre.localeCompare(a.nombre, 'es');
      default: return a.orden - b.orden;
    }
  });

  renderGrid(items);
}

function setTab(cat) {
  activeCat = cat;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.cat === cat));
  document.getElementById('searchInput').value = '';
  history.replaceState({}, '', `?cat=${cat}`);
  applyFilters();
}

document.querySelectorAll('.tab').forEach(t => t.onclick = () => setTab(t.dataset.cat));

['input', 'change'].forEach(evt => {
  document.getElementById('searchInput').addEventListener(evt, applyFilters);
  document.getElementById('sortSelect').addEventListener(evt, applyFilters);
  document.getElementById('priceMin').addEventListener(evt, applyFilters);
  document.getElementById('priceMax').addEventListener(evt, applyFilters);
  document.getElementById('onlyPriced').addEventListener(evt, applyFilters);
});

document.getElementById('clearFilters').addEventListener('click', () => {
  document.getElementById('searchInput').value = '';
  document.getElementById('sortSelect').value = 'default';
  document.getElementById('priceMin').value = '';
  document.getElementById('priceMax').value = '';
  document.getElementById('onlyPriced').checked = false;
  applyFilters();
});

(async function init() {
  CATALOG = await fetchCatalog();
  document.querySelectorAll('.tab').forEach(t => {
    const cat = t.dataset.cat;
    if (CATALOG[cat]) t.querySelector('.tab-count').textContent = CATALOG[cat].length;
  });
  setTab(activeCat);
})();
</script>
</body>
</html>
