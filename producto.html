<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Producto — Señores del Oro</title>
<meta name="description" id="metaDesc" content="Joyería de oro hecha a pedido en Guadalajara. Garantía de kilataje, entrega en 1 semana.">
<meta property="og:type" content="product">
<meta property="og:title" id="ogTitle" content="Señores del Oro">
<meta property="og:description" id="ogDesc" content="Joyería de oro hecha a pedido en Guadalajara.">
<meta property="og:image" id="ogImage" content="https://senoresdeloro.com/assets/SEN_ORES_DEL_ORO_NEGRO_CON_DORADO.png">
<meta property="og:url" id="ogUrl" content="https://senoresdeloro.com/producto.html">
<meta name="twitter:card" content="summary_large_image">
<link rel="stylesheet" href="assets/style.css">
<link rel="apple-touch-icon" href="assets/favicon.png">
<link rel="icon" type="image/png" href="assets/favicon.png">
<style>
/* ── PRODUCT HERO ── */
.prod-wrap {
  min-height: 100vh;
  padding-top: 80px;
  background: var(--negro);
}
.prod-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  min-height: calc(100vh - 80px);
}
.prod-img-col {
  position: sticky;
  top: 80px;
  height: calc(100vh - 80px);
  background: #0f0b06;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.prod-img-col img.foto {
  width: 100%; height: 100%;
  object-fit: cover;
}
.prod-img-placeholder {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  width: 100%; height: 100%;
}
.prod-img-placeholder img {
  width: 120px;
  opacity: .12;
}
.prod-img-placeholder span {
  font-size: 9px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: rgba(201,168,76,.3);
}

/* ── PRODUCT INFO ── */
.prod-info-col {
  padding: 80px 72px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  background: var(--carbon2);
}
.prod-breadcrumb {
  font-size: 9px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: rgba(232,224,204,.28);
  margin-bottom: 40px;
}
.prod-breadcrumb a {
  color: rgba(232,224,204,.28);
  text-decoration: none;
  transition: color .3s;
}
.prod-breadcrumb a:hover { color: var(--oro); }
.prod-breadcrumb span { margin: 0 10px; }
.prod-kilate {
  font-size: 9px;
  letter-spacing: 5px;
  text-transform: uppercase;
  color: var(--oro);
  margin-bottom: 14px;
}
.prod-nombre {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(36px, 4vw, 60px);
  font-weight: 300;
  color: var(--champagne);
  line-height: 1.05;
  margin-bottom: 10px;
}
.prod-sku {
  font-size: 9px;
  letter-spacing: 3px;
  color: rgba(232,224,204,.2);
  margin-bottom: 28px;
}
.prod-desc {
  font-size: 13px;
  line-height: 1.9;
  color: rgba(232,224,204,.5);
  max-width: 420px;
  margin-bottom: 40px;
}
.prod-specs {
  display: flex;
  flex-wrap: wrap;
  margin-bottom: 44px;
}
.prod-spec {
  padding: 14px 22px;
  min-width: 96px;
  border: 1px solid rgba(201,168,76,.1);
  margin-right: -1px;
  margin-bottom: -1px;
}
.prod-spec-label {
  font-size: 8px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: rgba(232,224,204,.28);
  margin-bottom: 5px;
}
.prod-spec-val {
  font-size: 14px;
  color: var(--champagne);
  font-family: 'Cormorant Garamond', serif;
}

/* ── VARIANT SELECTOR ── */
.prod-variants {
  margin-bottom: 32px;
}
.prod-variants-label {
  font-size: 9px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: rgba(232,224,204,.35);
  margin-bottom: 10px;
}
.prod-variants-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.variant-btn {
  background: rgba(255,255,255,.03);
  border: 1px solid rgba(201,168,76,.25);
  color: rgba(232,224,204,.7);
  font-family: 'Montserrat', sans-serif;
  font-size: 11px;
  letter-spacing: 1px;
  padding: 9px 18px;
  cursor: pointer;
  transition: all .25s;
}
.variant-btn:hover { border-color: var(--oro); color: var(--champagne); }
.variant-btn.active {
  background: var(--oro);
  border-color: var(--oro);
  color: var(--negro);
}
.prod-precio {
  font-family: 'Cormorant Garamond', serif;
  font-size: 44px;
  font-weight: 300;
  color: var(--oro);
  line-height: 1;
  margin-bottom: 28px;
}
.prod-precio.na {
  font-size: 14px;
  font-family: 'Montserrat', sans-serif;
  color: rgba(232,224,204,.3);
  font-style: italic;
}
.prod-cta {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  background: var(--oro);
  color: var(--negro);
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  padding: 16px 40px;
  cursor: pointer;
  border: none;
  font-family: 'Montserrat', sans-serif;
  font-weight: 500;
  transition: all .3s;
  text-decoration: none;
  width: fit-content;
}
.prod-cta:hover {
  background: var(--champagne);
  transform: translateY(-2px);
}
.prod-cta svg { flex-shrink: 0; }

/* ── RELATED ── */
.related {
  padding: 90px 60px;
  background: var(--negro);
}
.related-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 2px;
  margin-top: 44px;
}

/* ── LOADING / ERROR ── */
.prod-loading {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
  flex-direction: column;
  gap: 20px;
}
.prod-loading img { width: 56px; opacity: .3; animation: pulse 1.8s ease-in-out infinite; }
@keyframes pulse { 0%,100% { opacity:.15; } 50% { opacity:.45; } }
.prod-loading span { font-size: 9px; letter-spacing: 4px; text-transform: uppercase; color: rgba(232,224,204,.25); }

/* ── NOTA FOTO ── */
.foto-nota {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 8px;
  letter-spacing: 3px;
  color: rgba(201,168,76,.3);
  text-transform: uppercase;
  white-space: nowrap;
}

/* ── GALERÍA DE MINIATURAS ── */
.prod-thumbs {
  position: absolute;
  left: 20px;
  bottom: 20px;
  display: flex;
  gap: 8px;
  z-index: 2;
}
.prod-thumb {
  width: 52px;
  height: 52px;
  object-fit: cover;
  cursor: pointer;
  border: 1px solid rgba(232,224,204,.15);
  opacity: .55;
  transition: all .25s;
}
.prod-thumb:hover { opacity: .85; }
.prod-thumb.active {
  opacity: 1;
  border-color: var(--oro);
}

/* ── RESPONSIVE ── */
@media (max-width: 900px) {
  .prod-grid { grid-template-columns: 1fr; }
  .prod-img-col { height: 60vw; position: relative; top: 0; min-height: 300px; }
  .prod-info-col { padding: 48px 32px; }
  .related-grid { grid-template-columns: repeat(2,1fr); }
}
</style>
</head>
<body>


<div id="site-header"></div>

<div id="prodContent">
  <div class="prod-loading">
    <img src="assets/SEN_ORES_DEL_ORO_LOGO_UNICO_DORADO.png" alt="">
    <span>Cargando pieza...</span>
  </div>
</div>

<!-- Related section (populated by JS) -->
<section class="related" id="relatedSection" style="display:none">
  <div class="sec-label">También te puede interesar</div>
  <h2 style="font-family:'Cormorant Garamond',serif;font-size:clamp(28px,3vw,44px);font-weight:300;color:var(--champagne);">Otras piezas</h2>
  <div class="related-grid" id="relatedGrid"></div>
</section>

<div id="site-footer"></div>

<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="assets/config.js"></script>
<script src="assets/db.js"></script>
<script src="assets/partials.js"></script>
<script>
mountLayout({ navVariant: 'default' });

// ── CONFIG ──
const PHICON = 'assets/SEN_ORES_DEL_ORO_LOGO_UNICO_DORADO.png';
const WA_NUMBER = SITE_WA_NUMBER;

// ── GET SKU FROM URL ──
const params = new URLSearchParams(location.search);
const skuParam = params.get('sku');

// ── GET CATEGORY LABEL ──
function catLabel(cat) {
  return categoriaLabel(cat);
}

// ── BUILD SPEC ROW ──
function specRow(label, val) {
  if (!val) return '';
  return `<div class="prod-spec"><div class="prod-spec-label">${label}</div><div class="prod-spec-val">${val}</div></div>`;
}

// ── VARIANT SELECTOR ──
function variantLabel(v) {
  return v.variantLabel || v.largo || v.peso || v.sku;
}

function renderVariantSelector(item, variants) {
  if (variants.length < 2) return '';
  return `
    <div class="prod-variants">
      <div class="prod-variants-label">Elige tamaño</div>
      <div class="prod-variants-row">
        ${variants.map(v => `<button type="button" class="variant-btn ${v.sku === item.sku ? 'active' : ''}" data-sku="${v.sku}">${variantLabel(v)}</button>`).join('')}
      </div>
    </div>`;
}

function selectVariant(sku, variants, cat) {
  const next = variants.find(v => v.sku === sku);
  if (!next) return;
  history.replaceState({}, '', `producto.html?sku=${sku}`);
  renderProduct(next, cat, variants);
}

// ── RENDER PRODUCT ──
function renderProduct(item, cat, variants) {
  variants = variants || [item];
  document.title = `${item.nombre} — Señores del Oro`;
  const imgUrl = item.foto;
  const waMsg = encodeURIComponent(`Hola, me interesa la pieza: ${item.sku} - ${item.nombre}`);

  const ogDescText = item.desc || `${item.nombre} · ${item.kilate} · Señores del Oro`;
  document.getElementById('metaDesc').setAttribute('content', ogDescText);
  document.getElementById('ogTitle').setAttribute('content', `${item.nombre} — Señores del Oro`);
  document.getElementById('ogDesc').setAttribute('content', ogDescText);
  document.getElementById('ogUrl').setAttribute('content', `https://senoresdeloro.com/producto.html?sku=${item.sku}`);
  if (imgUrl) document.getElementById('ogImage').setAttribute('content', imgUrl);

  // Build specs
  let specs = '';
  specs += specRow('Kilate', item.kilate);
  if (item.largo) specs += specRow('Largo', item.largo);
  if (item.grosor) specs += specRow('Grosor', item.grosor);
  if (item.eslabon) specs += specRow('Eslabón', item.eslabon);
  if (item.placa) specs += specRow('Placa', item.placa);
  if (item.peso) specs += specRow('Peso', item.peso);

  const fotos = (item.fotos && item.fotos.length) ? item.fotos : (imgUrl ? [imgUrl] : []);
  const thumbsHtml = fotos.length > 1
    ? `<div class="prod-thumbs">${fotos.map((f, i) => `<img src="${f}" class="prod-thumb ${i === 0 ? 'active' : ''}" data-i="${i}" alt="">`).join('')}</div>`
    : '';

  document.getElementById('prodContent').innerHTML = `
    <div class="prod-wrap">
      <div class="prod-grid">
        <div class="prod-img-col">
          ${imgUrl
            ? `<img src="${imgUrl}" class="foto" alt="${item.nombre}" onerror="this.style.display='none';document.querySelector('.prod-img-placeholder').style.display='flex'">
               <div class="prod-img-placeholder" style="display:none;position:absolute;inset:0">
                 <img src="${PHICON}" alt="">
                 <span>Foto próximamente</span>
               </div>`
            : `<div class="prod-img-placeholder">
                 <img src="${PHICON}" alt="">
                 <span>Foto próximamente</span>
               </div>`}
          ${thumbsHtml}
          <div class="foto-nota">${item.sku}</div>
        </div>
        <div class="prod-info-col">
          <div class="prod-breadcrumb">
            <a href="index.html">Inicio</a>
            <span>/</span>
            <a href="coleccion.html?cat=${cat}">${catLabel(cat)}</a>
            <span>/</span>
            ${item.nombre}
          </div>
          <div class="prod-kilate">${item.kilate ? item.kilate + ' · ' : ''}Oro Amarillo</div>
          <h1 class="prod-nombre">${item.nombre}</h1>
          <p class="prod-sku">${item.sku}</p>
          <p class="prod-desc">${item.desc}</p>
          ${renderVariantSelector(item, variants)}
          ${specs ? `<div class="prod-specs">${specs}</div>` : ''}
          <div class="prod-precio ${formatPrecio(item.precio) ? '' : 'na'}">${formatPrecio(item.precio) || 'Consultar precio'}</div>
          <a class="prod-cta" href="https://wa.me/${WA_NUMBER}?text=${waMsg}" target="_blank">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
            Consultar por WhatsApp
          </a>
        </div>
      </div>
    </div>`;

  document.querySelectorAll('.variant-btn').forEach(btn => {
    btn.onclick = () => selectVariant(btn.dataset.sku, variants, cat);
  });

  document.querySelectorAll('.prod-thumb').forEach(thumb => {
    thumb.onclick = () => {
      document.querySelector('.prod-img-col img.foto').src = fotos[thumb.dataset.i];
      document.querySelectorAll('.prod-thumb').forEach(t => t.classList.remove('active'));
      thumb.classList.add('active');
    };
  });
}

// ── RENDER RELATED ──
function renderRelated(item, cat, catalog) {
  const pool = (catalog[cat] || []).filter(i =>
    item.variantGroup ? i.variantGroup !== item.variantGroup : i.sku !== item.sku
  );
  const picks = pool.sort(() => Math.random() - .5).slice(0, 4);
  if (!picks.length) return;

  const grid = document.getElementById('relatedGrid');
  picks.forEach(p => {
    const imgUrl = p.foto;
    const precio = formatPrecio(p.precio);
    const d = document.createElement('div');
    d.className = 'card';
    d.style.cursor = 'pointer';
    d.innerHTML = `
      <div class="card-img">
        ${imgUrl
          ? `<img src="${imgUrl}" class="photo" alt="${p.nombre}" onerror="this.style.display='none'">`
          : `<div class="card-ph"><img src="${PHICON}" alt=""></div>`}
        ${p.kilate ? `<span class="kilate">${p.kilate}</span>` : ''}
        <div class="card-ov"><span>Ver pieza</span></div>
      </div>
      <div class="card-info">
        <div class="card-nombre">${p.nombre}</div>
        <div class="card-precio ${precio ? '' : 'na'}">${precio ? (p.precioEsRango ? 'Desde ' : '') + precio : 'Consultar precio'}</div>
      </div>`;
    d.onclick = () => location.href = `producto.html?sku=${p.sku}`;
    grid.appendChild(d);
  });

  document.getElementById('relatedSection').style.display = 'block';
}

// ── INIT ──
(async function init() {
  if (!skuParam) {
    document.getElementById('prodContent').innerHTML = `
      <div class="prod-loading">
        <img src="${PHICON}" alt="">
        <span>SKU no encontrado</span>
      </div>`;
    return;
  }

  const result = await fetchProductWithVariants(skuParam);
  if (!result) {
    document.getElementById('prodContent').innerHTML = `
      <div class="prod-loading">
        <img src="${PHICON}" alt="">
        <span>Pieza no encontrada · <a href="coleccion.html" style="color:var(--oro)">Ver colección</a></span>
      </div>`;
    return;
  }

  const { item, variants } = result;
  renderProduct(item, item.categoria, variants);
  const catalog = await fetchCatalog();
  renderRelated(item, item.categoria, catalog);
})();
</script>
</body>
</html>
